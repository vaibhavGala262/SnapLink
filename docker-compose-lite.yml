services:
  app:
    build: .
    container_name: snaplink-lite-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: lite
      DATABASE_URL: jdbc:postgresql://postgres:5432/snaplink
      DATABASE_USERNAME: snaplink
      DATABASE_PASSWORD: snaplink
    depends_on:
      - postgres
    networks:
      - snaplink-net

  postgres:
    image: postgres:16
    container_name: snaplink-postgres
    environment:
      POSTGRES_DB: snaplink
      POSTGRES_USER: snaplink
      POSTGRES_PASSWORD: snaplink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - snaplink-net

volumes:
  postgres_data:

networks:
  snaplink-net:
