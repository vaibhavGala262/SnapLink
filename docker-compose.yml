services:
  app:
    build: .
    container_name: snaplink-app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/snaplink
      DATABASE_USERNAME: snaplink
      DATABASE_PASSWORD: snaplink
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_TIMEOUT: 2000ms
      KAFKA_BOOTSTRAP_SERVERS: snaplink-kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - snaplink-net

    networks:
      - snaplink-net

    container_name: snaplink-redis
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@snaplink-kafka:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://snaplink-kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      - snaplink-net

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: snaplink-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    ports:
      - "2181:2181"
    networks:
      - snaplink-net

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: snaplink-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
    ports:
      - "9092:9092"
    networks:
      snaplink-net:
        aliases:
          - kafka
          - snaplink-kafka

volumes:
  postgres_data:

networks:
  snaplink-net:
