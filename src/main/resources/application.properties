# ========== BASIC CONFIG ==========
spring.application.name=url-shortner

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.datasource.hikari.auto-commit=false


# ========== CRITICAL JPA/HIBERNATE OPTIMIZATIONS ==========
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

logging.level.com.vaibhavgala.url_shortner=INFO
logging.level.org.springframework.web=INFO
logging.level.org.apache.coyote.http11=WARN

spring.web.cors.allowed-origins=*
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.timeout=${REDIS_TIMEOUT:2000ms}

# ========== OPTIMIZED HIKARI CONNECTION POOL ==========
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.pool-name=HikariPool-UrlShortener

# ========== KAFKA BOOTSTRAP SERVERS ==========
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
# ========== KAFKA PRODUCER OPTIMIZATIONS ==========
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.batch-size=32768
spring.kafka.producer.linger-ms=5
spring.kafka.producer.buffer-memory=67108864
spring.kafka.producer.compression-type=snappy
spring.kafka.producer.acks=1
spring.kafka.producer.retries=3
spring.kafka.producer.max-in-flight-requests-per-connection=5
spring.kafka.producer.enable-idempotence=true
spring.kafka.producer.request-timeout-ms=30000
spring.kafka.producer.delivery-timeout-ms=120000

# ========== CRITICAL KAFKA CONSUMER OPTIMIZATIONS ==========
spring.kafka.consumer.group-id=click-tracking-group-v3
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# CRITICAL: Much smaller poll records to prevent timeouts
spring.kafka.consumer.max-poll-records=25
spring.kafka.consumer.max-poll-interval-ms=120000
spring.kafka.consumer.session-timeout-ms=30000
spring.kafka.consumer.heartbeat-interval-ms=10000

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.filter.DelegatingFilterProxy=DEBUG


logging.level.org.apache.kafka.clients.producer=DEBUG
logging.level.org.apache.kafka.clients.consumer=DEBUG
logging.level.org.apache.kafka.common.network=DEBUG
logging.level.org.apache.kafka.common.requests=DEBUG
logging.level.org.apache.kafka.clients.Fetcher=TRACE


# Fetch optimizations
spring.kafka.consumer.fetch-max-bytes=52428800
spring.kafka.consumer.fetch-min-bytes=1024
spring.kafka.consumer.fetch-max-wait-ms=500

# Enable auto-commit for better performance
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.auto-commit-interval-ms=1000

# ========== KAFKA LISTENER CONFIGURATION ==========
# CRITICAL: Enable concurrency for parallel processing
spring.kafka.listener.concurrency=8
spring.kafka.listener.type=batch
spring.kafka.listener.ack-mode=batch
spring.kafka.listener.poll-timeout=3000
spring.kafka.listener.idle-event-interval=30000

# Error handling
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.listener.immediate-stop=true

# ========== ENHANCED WEB SERVER CONFIG ==========
server.port=8080
server.tomcat.threads.max=300
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=200
server.tomcat.max-connections=10000
server.tomcat.connection-timeout=20000
server.tomcat.keep-alive-timeout=20000
server.tomcat.max-keep-alive-requests=100

# Connection pool for HTTP requests
server.tomcat.max-http-form-post-size=2097152
server.tomcat.max-swallow-size=2097152

# ========== ADDITIONAL PERFORMANCE TUNING ==========
# JVM optimization hints
spring.jpa.open-in-view=false
spring.main.lazy-initialization=false

# Expose metrics as well
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Show health details (e.g., DB status, disk, etc.)
management.endpoint.health.show-details=always

# Prometheus endpoint
management.endpoint.prometheus.enabled=true


management.metrics.export.prometheus.enabled=true
